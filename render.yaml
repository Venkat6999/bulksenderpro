services:
  - type: web
    name: bulksender-pro-python
    runtime: docker
    plan: starter
    region: ohio
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: RENDER
        value: "true"
      - key: DOCKER
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: wa-sessions
      mountPath: /data
      sizeGB: 1
